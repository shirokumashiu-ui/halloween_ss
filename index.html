<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  
  <title>👻 ハロウィン ARお菓子あつめ 🎃</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=M+PLUS+Rounded+1c:wght@900&display=swap" rel="stylesheet">

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body class="m-0 overflow-hidden select-none">

  <div id="loading" class="loading-bg">
    <div class="magic-portal">🔮</div>
    <p class="loading-text text-stroke">HALLOWEEN AR</p>
    <p class="loading-sub">魔法のカメラを起動しています...</p>
  </div>

  <div class="ui-container">
    
    <div class="header-container">
      <header class="header-banner transform -rotate-1 interactive">
        <h1 class="header-title text-stroke">🎃 FIND THE CANDY! 🍬</h1>
      </header>
      <div id="guide-overlay" class="guide-box">
        👻 黒枠つきの「オバケのマーカー」を写してね！
      </div>
    </div>

    <div id="candy-container" class="candy-display-area interactive"></div>

    <div id="clear-message" class="clear-modal-wrapper interactive">
      <div class="clear-popup">
        <div class="popup-icon">🏆✨</div>
        <h2 class="popup-title text-stroke">HAPPY HALLOWEEN!</h2>
        <p class="popup-desc">お菓子を全部あつめたよ！🎉</p>
        <button onclick="resetGame()" class="btn-retry">もう一回あそぶ！</button>
      </div>
    </div>

    <footer class="footer-banner interactive">
      <p class="footer-text text-stroke">
        🍬 あつめたお菓子: <span id="score" class="score-number">0</span> / 3 個
      </p>
    </footer>

  </div>

  <a-scene
    vr-mode-ui="enabled: false;"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

   <a-marker preset="hiro" id="obake-marker">

    <a-entity camera></a-entity>
  </a-scene>

  <script src="app.js"></script>
</body>
</html>
